# NoetixAgent Configuration Example
# Copy to ~/.noetix/config.yaml and customize

# ─── Model ────────────────────────────────────────────────────────
model: "openrouter:qwen/qwen3-coder:free"
provider: "openrouter"
api_key_env: "OPENROUTER_API_KEY"   # env var holding your API key

# Other provider examples:
# model: "openai:gpt-4o"
# model: "anthropic:claude-sonnet-4-5"
# model: "ollama:qwen2.5-coder:7b"   # local Ollama
# model: "lmstudio:local-model"       # local LM Studio

base_url: ""   # leave empty to use provider default

max_tokens: 4096
temperature: 0.7

# ─── Paths ────────────────────────────────────────────────────────
memory_dir: "~/.noetix/memory"
skills_dir: "~/.noetix/skills"
workspace_dir: "~/.noetix/workspace"

# ─── Security ─────────────────────────────────────────────────────
security:
  require_approval:        # these tools prompt before running
    - bash
    - nmap_scan
    - exploit_search
  sandbox_mode: false      # set true to restrict file access

# ─── Messaging Gateway ────────────────────────────────────────────
gateway:
  enabled: false
  port: 8765
  telegram:
    enabled: false
    bot_token: ""          # get from @BotFather
    allowed_users: []      # list of numeric Telegram user IDs (empty = all)
  discord:
    enabled: false
    token: ""              # Discord bot token
    allowed_channels: []   # list of channel IDs (empty = all)

# ─── Memory ───────────────────────────────────────────────────────
memory:
  max_entries: 500
  auto_save: true
  search_enabled: true

# ─── Logging ──────────────────────────────────────────────────────
log_level: "INFO"   # DEBUG | INFO | WARNING | ERROR
